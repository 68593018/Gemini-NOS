nodes:
  - name: "ProcA"
    uds_path: "/tmp/nos_proc_A.sock"
    threads:
      - name: "Worker-1"
        components: [1]
      - name: "Worker-2"
        components: [2, 3, 5]  # Comp-5 搬家到了 ProcA

  - name: "ProcB"
    uds_path: "/tmp/nos_proc_B.sock"
    threads:
      - name: "Worker-1"
        components: [4] # ProcB 现在只剩下 Comp-4

services:
  - id: 101
    node: "ProcA"
    provider: 1
  - id: 204
    node: "ProcB"
    provider: 4
